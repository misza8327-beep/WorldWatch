<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch Shop</title>
    <style>
        :root { --main-color: #00ffcc; --bg-color: #0a0a0a; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* Приветственный экран */
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .welcome-text { font-size: 3rem; margin-bottom: 20px; color: var(--main-color); text-align: center; }
        .skip-btn { padding: 15px 40px; border: 2px solid var(--main-color); background: var(--main-color); color: black; cursor: pointer; border-radius: 50px; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .skip-btn:hover { background: transparent; color: white; }

        /* Основной контент */
        #main-content { display: none; height: 100vh; overflow-y: auto; padding: 40px 20px; text-align: center; }
        .header { font-size: 3rem; color: var(--main-color); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px; }
        
        /* Сетка продуктов */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; }
        .product-card { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-color); transform: scale(1.03); }
        .price { font-size: 1.8rem; color: var(--main-color); margin: 15px 0; }

        /* Контакты и Языки */
        .lang-switcher { position: absolute; top: 20px; left: 20px; }
        .lang-btn { background: #222; color: white; border: 1px solid #444; padding: 8px 12px; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .whatsapp-btn { display: inline-block; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        .whatsapp-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>

    <div id="intro">
        <div class="welcome-text" id="hello-text">Добрый день</div>
        <button class="skip-btn" onclick="showMain()" id="skip-txt">Пропустить</button>
    </div>

    <div id="main-content">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('it')">IT</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" onclick="changeLang('pl')">PL</button>
        </div>

        <h1 class="header">WorldWatch</h1>
        <h2 id="prod-title">Наши Продукты</h2>

        <div class="products-grid" id="products-list">
            </div>

        <a href="https://wa.me/48796128572" class="whatsapp-btn">WhatsApp: +48 796 128 572</a>
        <p style="margin-top: 50px; color: #555;">© 2026 WorldWatch Shop</p>
    </div>

    <script>
        // ТВОИ ТОВАРЫ (Редактируй названия и цены тут!)
        const myProducts = [
            { name: "Classic Watch", price: "450 PLN", icon: "⌚" },
            { name: "Sport Band", price: "120 PLN", icon: "🏃" },
            { name: "Luxury Gold", price: "990 PLN", icon: "👑" },
            { name: "Smart Pro", price: "600 PLN", icon: "📱" }
        ];

        const translations = {
            ru: { hello: "Добрый день", skip: "Пропустить", title: "Наши Продукты" },
            it: { hello: "Buon giorno", skip: "Saltare", title: "I nostri prodotti" },
            en: { hello: "Good day", skip: "Skip", title: "Our Products" },
            pl: { hello: "Dzień dobry", skip: "Pominąć", title: "Nasze Produkty" }
        };function showMain() {
            document.body.style.overflow = 'auto';
            document.getElementById('intro').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProducts();
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = myProducts.map(p => 
                <div class="product-card">
                    <div style="font-size: 60px; margin-bottom: 10px;">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <div class="price">${p.price}</div>
                </div>
            ).join('');
        }

        function changeLang(lang) {
            document.getElementById('hello-text').innerText = translations[lang].hello;
            document.getElementById('skip-txt').innerText = translations[lang].skip;
            document.getElementById('prod-title').innerText = translations[lang].title;
        }
    </script>
</body>
</html>
