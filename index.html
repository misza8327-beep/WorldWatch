<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch Shop</title>
    <style>
        :root { --main-color: #00ffcc; --bg-color: #0a0a0a; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-y: auto; }
        
        /* Основной контент */
        #main-content { padding: 40px 20px; text-align: center; }
        .header { font-size: 3.5rem; color: var(--main-color); margin-top: 20px; text-transform: uppercase; letter-spacing: 8px; }
        
        /* Сетка продуктов */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; }
        .product-card { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; transition: 0.3s; text-align: left; }
        .product-card:hover { border-color: var(--main-color); transform: translateY(-5px); }
        
        .product-card h3 { color: var(--main-color); margin: 10px 0; }
        .price { font-size: 1.6rem; color: white; margin: 15px 0; font-weight: bold; border-top: 1px solid #333; padding-top: 10px; }

        /* WhatsApp */
        .whatsapp-btn { 
            display: inline-block; background: #25d366; color: white; 
            padding: 18px 35px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; margin-top: 40px; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 class="header">WorldWatch</h1>
        <h2 style="color: #444; text-transform: uppercase; letter-spacing: 2px;">Каталог Продуктов</h2>
        
        <div class="products-grid" id="products-list">
            </div>

        <a href="https://wa.me/48796128572" class="whatsapp-btn">Заказать через WhatsApp</a>
        <p style="margin-top: 20px; color: #444;">WhatsApp: +48 796 128 572</p>
    </div>

    <script>
        // Твои товары — меняй названия и цены здесь
        const myProducts = [
            { name: "Golden Luxury", price: "899 PLN", desc: "Эксклюзивные часы.", icon: "👑" },
            { name: "Sport Aqua", price: "350 PLN", desc: "Для активного отдыха.", icon: "⌚" },
            { name: "Smart Future", price: "550 PLN", desc: "Умные технологии.", icon: "📱" }
        ];

        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = myProducts.map(p => 
                <div class="product-card">
                    <div style="font-size: 50px;">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <p style="color:#aaa;">${p.desc}</p>
                    <div class="price">${p.price}</div>
                </div>
            ).join('');
        }

        // Запуск отрисовки сразу при загрузке
        window.onload = renderProducts;
    </script>
</body>
</html>
