<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch Admin Panel</title>
    <style>
        :root { --main-color: #00ffcc; --bg-color: #0a0a0a; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        #main-content { padding: 40px 20px; text-align: center; }
        .header { font-size: 3.5rem; color: var(--main-color); text-transform: uppercase; letter-spacing: 8px; }
        
        /* Сетка продуктов */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 40px auto; }
        .product-card { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; position: relative; }
        .product-card h3 { color: var(--main-color); margin: 10px 0; }
        .price { font-size: 1.8rem; color: white; font-weight: bold; border-top: 1px solid #333; padding-top: 15px; display: block; }
        
        /* Панель админа (скрыта) */
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 30px; border: 2px solid var(--main-color); z-index: 10000;
            border-radius: 20px; width: 300px; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        #admin-panel input, #admin-panel textarea { 
            width: 100%; margin-bottom: 10px; background: #333; border: 1px solid #444; color: white; padding: 10px; box-sizing: border-box;
        }
        .admin-btn { background: var(--main-color); color: black; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; cursor: pointer; display: none; }

        .whatsapp-btn { display: inline-block; background: #25d366; color: white; padding: 18px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 class="header">WorldWatch</h1>
        <div class="products-grid" id="products-list"></div>
        <a href="https://wa.me/48796128572" class="whatsapp-btn">Связаться в WhatsApp</a>
        <p style="margin-top: 20px; color: #333; font-size: 0.8rem;">Press Ctrl + L to login</p>
    </div>

    <div id="admin-panel">
        <h3>Добавить товар</h3>
        <input type="text" id="p-name" placeholder="Название">
        <input type="text" id="p-price" placeholder="Цена (н-р: 500 PLN)">
        <textarea id="p-desc" placeholder="Описание"></textarea>
        <input type="text" id="p-icon" placeholder="Эмодзи (н-р: ⌚)">
        <button class="admin-btn" onclick="addProduct()">Добавить на сайт</button>
        <button class="admin-btn" style="background: #555; margin-top: 5px;" onclick="closeAdmin()">Закрыть</button>
    </div>

    <script>
        // Начальные товары (если памяти нет)
        let defaultProducts = [
            { name: "Golden Luxury", price: "899 PLN", desc: "Эксклюзивные часы.", icon: "👑" }
        ];

        // Загрузка товаров из памяти твоего компьютера
        let products = JSON.parse(localStorage.getItem('mySiteProducts')) || defaultProducts;

        function render() {
            const list = document.getElementById('products-list');
            list.innerHTML = products.map((p, index) => `
                <div class="product-card">
                    <button class="delete-btn" onclick="deleteProduct(${index})">❌</button>
                    <div style="font-size: 50px;">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <p style="color:#aaa;">${p.desc}</p><span class="price">${p.price}</span>
                </div>
            `).join('');
            
            // Если мы в режиме админа, показываем кнопки удаления
            if (isAdmin) {
                document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'block');
            }
        }

        let isAdmin = false;

        // Секретный вход: нажми Ctrl + L
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'l') {
                let pass = prompt("Введите пароль администратора:");
                if (pass === "1234") { // МОЖЕШЬ ПОМЕНЯТЬ ПАРОЛЬ ТУТ
                    isAdmin = true;
                    document.getElementById('admin-panel').style.display = 'block';
                    render();
                } else {
                    alert("Доступ запрещен!");
                }
            }
        });

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;
            const icon = document.getElementById('p-icon').value;

            if (name && price) {
                products.push({ name, price, desc, icon });
                saveAndRefresh();
            }
        }

        function deleteProduct(index) {
            products.splice(index, 1);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('mySiteProducts', JSON.stringify(products));
            render();
            // Очистка полей
            document.querySelectorAll('#admin-panel input, #admin-panel textarea').forEach(i => i.value = '');
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        window.onload = render;
    </script>
</body>
</html>
