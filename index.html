<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWatch Shop</title>
    <style>
        :root { --main-color: #00ffcc; --bg-color: #0a0a0a; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Основной экран */
        #main-content { padding: 40px 20px; text-align: center; min-height: 100vh; }
        .header { font-size: 3rem; color: var(--main-color); text-transform: uppercase; letter-spacing: 8px; margin-bottom: 30px; }
        
        /* Сетка товаров */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: left; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-color); }
        .product-card h3 { color: var(--main-color); margin: 10px 0; }
        .price { font-size: 1.6rem; color: white; font-weight: bold; display: block; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }

        /* Админка (скрыта по умолчанию) */
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 30px; border: 2px solid var(--main-color); z-index: 9999;
            border-radius: 20px; width: 320px; box-shadow: 0 0 100px #000;
        }
        #admin-panel input, #admin-panel textarea { 
            width: 100%; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; padding: 12px; box-sizing: border-box; border-radius: 8px;
        }
        .admin-btn { background: var(--main-color); color: black; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 8px; margin-top: 5px; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; display: none; }

        .whatsapp-btn { display: inline-block; background: #25d366; color: white; padding: 18px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 class="header">WorldWatch</h1>
        <div class="products-grid" id="products-list">
            </div>
        <a href="https://wa.me/48796128572" class="whatsapp-btn">Заказать в WhatsApp</a>
    </div>

    <div id="admin-panel">
        <h3 style="color:var(--main-color); margin-top:0;">Добавить товар</h3>
        <input type="text" id="new-name" placeholder="Название">
        <input type="text" id="new-price" placeholder="Цена (н-р: 600 PLN)">
        <textarea id="new-desc" placeholder="Описание товара"></textarea>
        <input type="text" id="new-icon" placeholder="Эмодзи (⌚, 👑, 📱)">
        <button class="admin-btn" onclick="addNewItem()">Добавить на сайт</button>
        <button class="admin-btn" style="background:#444; color:white;" onclick="closeAdmin()">Закрыть</button>
    </div>

    <script>
        // Твой секретный пароль
        const PASS = "1396";

        // Загружаем товары из памяти твоего браузера
        let myItems = JSON.parse(localStorage.getItem('ww_items')) || [
            { name: "Classic Gold", price: "899 PLN", desc: "Пример товара.", icon: "⌚" }
        ];

        // Рисуем товары на экране
        function render() {
            const container = document.getElementById('products-list');
            container.innerHTML = myItems.map((item, index) => `
                <div class="product-card"><button class="del-btn" id="del-${index}" onclick="deleteItem(${index})">Удалить</button>
                    <div style="font-size: 50px;">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p style="color:#888; font-size: 0.9rem;">${item.desc}</p>
                    <span class="price">${item.price}</span>
                </div>
            `).join('');
        }

        // Слушаем нажатие клавиши ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                let inputPass = prompt("Введите пароль администратора:");
                if (inputPass === PASS) {
                    document.getElementById('admin-panel').style.display = 'block';
                    // Показываем кнопки удаления на всех товарах
                    document.querySelectorAll('.del-btn').forEach(btn => btn.style.display = 'block');
                } else {
                    alert("Неверный пароль!");
                }
            }
        });

        // Добавление нового товара
        function addNewItem() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const desc = document.getElementById('new-desc').value;
            const icon = document.getElementById('new-icon').value || "⌚";

            if (name && price) {
                myItems.push({ name, price, desc, icon });
                saveAndRender();
                // Очищаем поля
                document.getElementById('new-name').value = '';
                document.getElementById('new-price').value = '';
                document.getElementById('new-desc').value = '';
            }
        }

        // Удаление товара
        function deleteItem(index) {
            myItems.splice(index, 1);
            saveAndRender();
            // Оставляем кнопки удаления активными
            document.querySelectorAll('.del-btn').forEach(btn => btn.style.display = 'block');
        }

        // Сохранение в память браузера
        function saveAndRender() {
            localStorage.setItem('ww_items', JSON.stringify(myItems));
            render();
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
            document.querySelectorAll('.del-btn').forEach(btn => btn.style.display = 'none');
        }

        // Запуск при открытии сайта
        window.onload = render;
    </script>
</body>
</html>
