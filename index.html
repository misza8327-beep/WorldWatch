<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WorldWatch</title>
    <style>
        body { background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        #clock { font-size: 80px; text-shadow: 0 0 20px #0f0; }
        h1 { letter-spacing: 10px; border-bottom: 2px solid #0f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>WORLDWATCH</h1>
    <div id="clock">00:00:00</div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
